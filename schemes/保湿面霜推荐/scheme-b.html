<!DOCTYPE html>
<!-- 方案B · 文本 + 一行三竖卡（3列并排）
     组合模式：text_block → vertical_card_3col
     适用：多商品快速对比，视觉扫一眼 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案B · 文本 + 一行三竖卡</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text-primary:   #171A26;
      --text-body:      #3D414D;
      --text-hint:      #9B9EA8;
      --price:          #FF0F23;
      --card-bg:        #F5F6FA;
      --page-bg:        #FFFFFF;
      --tag-red-bg:     #FF0F23;
      --tag-red-text:   #FFFFFF;
      --font:           "PingFang SC", -apple-system, "Helvetica Neue", sans-serif;
    }

    body {
      background: #EDEDED;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 0 48px;
      font-family: var(--font);
    }
    .label {
      width: 375px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #888;
      letter-spacing: 0.4px;
    }
    .label strong { color: #333; font-size: 13px; }

    .output {
      width: 375px;
      background: var(--page-bg);
      padding: 16px;
    }

    .md-h1 {
      font-size: 16px;
      font-weight: 600;
      line-height: 28px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .md-p {
      font-size: 14px;
      font-weight: 400;
      line-height: 24px;
      color: var(--text-body);
    }

    .gap      { height: 24px; }

    /* ── 卡片区容器 ── */
    .card-wrap {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 8px;
    }

    /* ── 一行三竖卡布局 ── */
    .v3-row {
      display: flex;
      gap: 8px;
    }

    .v3-card {
      flex: 1;
      min-width: 0;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    /* 图片占位 111×111px (1:1) */
    .v3-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #D8D9DE;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .v3-img svg { opacity: 0.4; }

    /* 自营标签叠加在图片左上角 */
    .tag-zying-overlay {
      position: absolute;
      top: 4px;
      left: 4px;
      background: var(--tag-red-bg);
      color: var(--tag-red-text);
      font-size: 9px;
      font-weight: 600;
      padding: 1px 3px;
      border-radius: 2px;
      line-height: 13px;
      z-index: 1;
    }

    .v3-body {
      padding: 6px 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .v3-name {
      font-size: 12px;
      font-weight: 400;
      line-height: 18px;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .v3-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .price {
      display: flex;
      align-items: baseline;
      gap: 1px;
      color: var(--price);
    }
    .price-sym { font-size: 10px; font-weight: 600; }
    .price-num { font-size: 13px; font-weight: 600; line-height: 1.2; }
    .btn-add-sm {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--price);
      background: white;
      color: var(--price);
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="label"><strong>方案 B</strong> &nbsp;·&nbsp; 文本 + 一行三竖卡（text_block → vertical_card_3col）</div>

<div class="output">

  <div class="md-h1">为你推荐3款保湿面霜</div>

  <p class="md-p">综合保湿效果和性价比，这3款各有侧重，一起看看——</p>

  <div class="gap"></div>

  <!-- 一行三竖卡 -->
  <div class="card-wrap">
    <div class="v3-row">

      <!-- 卡片1 -->
      <div class="v3-card">
        <div class="v3-img">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#888">
            <path d="M12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/>
          </svg>
          <span class="tag-zying-overlay">自营</span>
        </div>
        <div class="v3-body">
          <div class="v3-name">雅诗兰黛DW高效保湿面霜50ml</div>
          <div class="v3-bottom">
            <div class="price"><span class="price-sym">¥</span><span class="price-num">890</span></div>
            <div class="btn-add-sm">+</div>
          </div>
        </div>
      </div>

      <!-- 卡片2 -->
      <div class="v3-card">
        <div class="v3-img">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#888">
            <path d="M12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/>
          </svg>
          <span class="tag-zying-overlay">自营</span>
        </div>
        <div class="v3-body">
          <div class="v3-name">兰蔻菁纯甜蜜滋养霜50ml</div>
          <div class="v3-bottom">
            <div class="price"><span class="price-sym">¥</span><span class="price-num">450</span></div>
            <div class="btn-add-sm">+</div>
          </div>
        </div>
      </div>

      <!-- 卡片3 -->
      <div class="v3-card">
        <div class="v3-img">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#888">
            <path d="M12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/>
          </svg>
          <span class="tag-zying-overlay">自营</span>
        </div>
        <div class="v3-body">
          <div class="v3-name">科颜氏高保湿面霜200ml大容量</div>
          <div class="v3-bottom">
            <div class="price"><span class="price-sym">¥</span><span class="price-num">320</span></div>
            <div class="btn-add-sm">+</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="gap"></div>

  <p class="md-p">价格由高到低覆盖不同预算，想深入了解哪款可以告诉我～</p>

</div>
</body>
</html>
